services:
  mongodb:
    image: mongo:7.0.21
    container_name: quorum-mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-quorum}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:?Set MONGO_PASSWORD in your .env file (e.g. MONGO_PASSWORD=your-secure-password)}
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quorum-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://${MONGO_USER:-quorum}:${MONGO_PASSWORD:?Set MONGO_PASSWORD in your .env file}@mongodb:27017/quorum?authSource=admin
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - EVALUATION_TIMEOUT=30000
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
        - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
        - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
    container_name: quorum-frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy

  demo-chatbot:
    build:
      context: .
      dockerfile: demo/rag-chatbot/Dockerfile
    container_name: quorum-demo-chatbot
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - QUORUM_URL=http://backend:3000
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - demo

volumes:
  mongodb_data:
