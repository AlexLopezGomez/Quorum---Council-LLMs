services:
  mongodb:
    image: mongo:7
    container_name: quorum-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quorum-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/quorum
      - FRONTEND_URL=http://localhost:8080
      - EVALUATION_TIMEOUT=30000
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quorum-frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy

  demo-chatbot:
    build:
      context: .
      dockerfile: demo/rag-chatbot/Dockerfile
    container_name: quorum-demo-chatbot
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - QUORUM_URL=http://backend:3000
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - demo

volumes:
  mongodb_data:
